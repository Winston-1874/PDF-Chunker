<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Configurator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#f4f3f0;color:#1a1a1a;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border:1px solid #c9c7c2;padding:48px 40px;width:360px}
  .logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:#1a1a1a;letter-spacing:0.05em;margin-bottom:36px}
  .logo span{color:#7a7a7a}
  label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#5c5c5c;font-family:'DM Mono',monospace;margin-bottom:8px}
  input[type="password"]{width:100%;background:#fff;border:1px solid #c9c7c2;color:#1a1a1a;font-family:'DM Mono',monospace;font-size:13px;padding:10px 14px;outline:none;margin-bottom:20px;transition:border-color .15s}
  input[type="password"]:focus{border-color:#1a1a1a}
  button{width:100%;background:#1a1a1a;color:#fff;border:none;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;padding:12px;cursor:pointer;transition:background .15s}
  button:hover{background:#333}
  .error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;font-family:'DM Mono',monospace;font-size:11px;padding:10px 14px;margin-bottom:18px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">RAG<span>/</span>Config</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label>Mot de passe</label>
    <input type="password" name="password" autofocus>
    <button type="submit">Connexion →</button>
  </form>
</div>
</body>
</html>
